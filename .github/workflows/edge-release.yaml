name: Release Edge MCP tooling

on:
  push:
    branches:
      - main

jobs:
  build-edge:
    name: Build Edge MCP binary
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-musl
          # - aarch64-unknown-linux-musl
          # - x86_64-pc-windows-gnu
          # - x86_64-apple-darwin
          # - aarch64-apple-darwin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Build Release
        uses: zijiren233/cargo-cross@v1
        with:
          command: build
          targets: ${{ matrix.target }}
      
      - name: Prepare binary for upload
        run: |
          if [ -f target/${{ matrix.target }}/release/edge ]; then
            rsync --archive --mkpath target/${{ matrix.target }}/release/edge dist/edge-${{ matrix.target }}
          elif [ -f target/${{ matrix.target }}/release/edge.exe ]; then
            rsync --archive --mkpath target/${{ matrix.target }}/release/edge.exe dist/edge-${{ matrix.target }}.exe
          fi
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*

  publish-edge:
    name: Publish to GitHub
    needs: build-edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Prepare release binaries
        run: |
          rsync --archive --verbose --mkpath \
            --include='edge-*' \
            --exclude='*' \
            artifacts/ release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          gh release create "$VERSION" \
            --title "Edge MCP Client $VERSION" \
            --generate-notes \
            release/*

  publish-npm:
    name: Publish to NPM
    needs: publish-edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-openclaw:
    name: Publish to ClawHub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Make Node Happy
        run: corepack enable
      
      - uses: actions/setup-node@v6
        with:
          node-version: 24
  
      - name: Publish to ClawHub
        run: |
          VERSION=$(git describe --tags --abbrev=0 | sed 's/^v//')
          npx clawhub@latest login --token ${{ secrets.CLAWHUB_TOKEN }} --no-browser
          npx clawhub@latest publish plugins/openclaw --slug=edge --name=Edge.Trade --version=$VERSION
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}

  publish-claude:
    name: Publish to Claude
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Create marketplace.json
        run: |
          cat > marketplace.json << 'EOF'
          {
            "plugins": [
              {
                "name": "edge",
                "source": "./plugins/claude",
                "version": "${{ github.ref_name }}"
              }
            ]
          }
          EOF
      
      - name: Commit marketplace.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add marketplace.json
          git commit -m "chore: update marketplace for ${{ github.ref_name }}" || echo "No marketplace changes"
          git push origin main || true
